<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Belanja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">Daftar Belanja</h1>

        <form id="item-form" class="mb-4">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="namaBarang" class="form-label">Nama Barang</label>
                    <input type="text" id="namaBarang" class="form-control" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="jumlah" class="form-label">Jumlah</label>
                    <input type="number" id="jumlah" class="form-control" min="1" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="keterangan" class="form-label">Keterangan</label>
                    <input type="text" id="keterangan" class="form-control">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Simpan</button>
            </div>
        </form>

        <div id="cards-row" class="row g-3"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
