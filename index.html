<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Belanja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Daftar Belanja</h1>

        <!-- Form input -->
        <form id="item-form" class="mb-3">
            <div class="card body">
                <div class="mb-3">
                    <label for="namaBarang" class="form-label">Nama Barang</label>
                    <input type="text" id="namaBarang" class="form-control" placeholder="Masukkan Nama Barang" required>
                </div>
                <div class="mb-3">
                    <label for="jumlah" class="form-label">Jumlah</label>
                    <input type="number" id="jumlah" class="form-control" min="1" placeholder="Masukkan Jumlah" required>
                </div>
                <div class="mb-3">
                    <label for="keterangan" class="form-label">Keterangan</label>
                    <input type="text" id="keterangan" class="form-control" placeholder="Masukkan Keterangan">
                </div>
                <div class="mb-3">
                    <label for="gambar" class="form-label">Gambar (URL)</label>
                    <input type="text" id="gambar" class="form-control" placeholder="Masukkan URL Gambar">
            </div>
            <div class="mt-3">
                <button class="btn btn-primary" onclick="simpanBarang()">Simpan</button>
            </div>
        </form>
<!-- untuk menampilkan daftar belanja -->
        <div class="row" id="DaftarBelanja"></div>
        </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
